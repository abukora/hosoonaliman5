<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حصون الإيمان – المنهج الصيفي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* تحسينات إضافية لعرض الدرس داخل الصفحة */
        .lesson-content {
            background: #fff;
            border-radius: 20px;
            padding: 30px 35px;
            box-shadow: var(--shadow);
            line-height: 1.9;
        }
        .lesson-content h2 {
            color: var(--primary-dark);
            border-right: 6px solid var(--gold);
            padding-right: 16px;
            margin-top: 30px;
            margin-bottom: 16px;
        }
        .lesson-content .verse {
            background: #f0f4f8;
            padding: 16px 24px;
            border-radius: 12px;
            border-right: 6px solid var(--gold);
            margin: 20px 0;
        }
        .lesson-content .tip-box {
            background: #e8f5e9;
            padding: 16px 24px;
            border-radius: 12px;
            border-right: 6px solid var(--green);
            margin: 20px 0;
        }
        .lesson-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .lesson-nav button {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            background: var(--primary-dark);
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .lesson-nav button:hover { transform: scale(1.03); opacity: 0.9; }
        .lesson-nav button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-complete-lesson { background: var(--green) !important; }
        .btn-complete-lesson.done { background: #6c757d !important; }
        .share-btn { background: #1a73e8 !important; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- شريط التنقل -->
    <nav class="navbar">
        <a class="logo" onclick="navigateTo('home')"><i class="fas fa-shield-alt"></i> حصون الإيمان</a>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="navLinks">
            <li><a onclick="navigateTo('home')">الرئيسية</a></li>
            <li><a onclick="navigateTo('plan')">خطة التدريس</a></li>
            <li><a class="btn-nav" onclick="navigateTo('contact')">تواصل معنا</a></li>
        </ul>
    </nav>

    <!-- الحاوية الرئيسية -->
    <div class="app-container" id="appContainer">
        <!-- سيتم تعبئتها بواسطة JavaScript -->
    </div>

    <!-- التذييل -->
    <footer>
        <p>© 2026 حصون الإيمان. جميع الحقوق محفوظة.</p>
        <div class="social-links">
            <a href="https://chat.whatsapp.com/ImbpCTYkTwHJvD9akTAIPD"><i class="fab fa-whatsapp"></i></a>
            <a href="https://t.me/+bHRjkt2DD_BmODhk"><i class="fab fa-telegram"></i></a>
            <a href="mailto:abukora8@gmail.com"><i class="far fa-envelope"></i></a>
        </div>
    </footer>

    <!-- نافذة التشجيع -->
    <div class="modal" id="cheerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="stars">🌟🌟🌟🌟🌟</div>
            <h2 id="cheerMessage">أحسنت يا بطل!</h2>
            <p id="cheerDesc">لقد أتممت الدرس بنجاح، واصل رحلتك الإيمانية!</p>
            <button class="modal-btn" onclick="closeModal()">ممتاز! 🚀</button>
        </div>
    </div>

    <!-- تحميل البيانات والوظائف -->
    <script src="js/data.js"></script>
    <script>
        // ==================== دوال التقدم ====================
        function getProgressKey(courseId, lessonIndex) {
            return `hosoonaliman_progress_${courseId}_${lessonIndex}`;
        }
        function isLessonDone(courseId, lessonIndex) {
            return localStorage.getItem(getProgressKey(courseId, lessonIndex)) === 'true';
        }
        function getCourseProgress(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return 0;
            let done = 0;
            course.lessons.forEach((_, idx) => {
                if (isLessonDone(courseId, idx)) done++;
            });
            return Math.round((done / course.lessons.length) * 100);
        }

        // ==================== التنقل بين الأقسام ====================
        let currentSection = 'home';
        let currentCourseId = null;
        let currentLessonIndex = null;

        function navigateTo(section) {
            if (section === 'home') {
                currentSection = 'home';
                currentCourseId = null;
                currentLessonIndex = null;
            } else if (section === 'plan') {
                currentSection = 'plan';
            } else if (section === 'contact') {
                currentSection = 'contact';
            } else if (section.startsWith('course-')) {
                currentSection = 'course';
                currentCourseId = parseInt(section.split('-')[1]);
                currentLessonIndex = null;
            } else if (section.startsWith('lesson-')) {
                currentSection = 'lesson';
                const parts = section.split('-');
                currentCourseId = parseInt(parts[1]);
                currentLessonIndex = parseInt(parts[2]);
            }
            renderSection();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('navLinks').classList.remove('active');
        }

        // ==================== العرض ====================
        function renderSection() {
            const container = document.getElementById('appContainer');
            let html = '';
            switch (currentSection) {
                case 'home': html = renderHome(); break;
                case 'plan': html = renderPlan(); break;
                case 'contact': html = renderContact(); break;
                case 'course': html = renderCourse(currentCourseId); break;
                case 'lesson': html = renderLesson(currentCourseId, currentLessonIndex); break;
                default: html = renderHome();
            }
            container.innerHTML = html;
            // ربط الأحداث بعد التحميل
            if (currentSection === 'lesson') {
                attachLessonEvents();
            }
        }

        // ---------- الصفحة الرئيسية ----------
        function renderHome() {
            let gridHtml = '';
            courses.forEach(c => {
                const pct = getCourseProgress(c.id);
                gridHtml += `
                    <div class="course-card" onclick="navigateTo('course-${c.id}')">
                        <div class="icon"><i class="fas ${c.icon}" style="color:${c.color}"></i></div>
                        <h3>${c.title}</h3>
                        <div class="badge">${c.lessons.length} دروس</div>
                        <div class="progress-indicator"><div class="fill" style="width:${pct}%;"></div></div>
                        <span style="font-size:0.8rem;color:var(--text-light);">${pct}%</span>
                    </div>
                `;
            });
            return `
                <div class="hero">
                    <h1>حصون الإيمان</h1>
                    <p>المنهج الصيفي المتكامل لبناء شخصية ابنك المسلمة</p>
                    <p class="sub-meta">📚 10 كراسات &nbsp;|&nbsp; 130 درساً &nbsp;|&nbsp; 45 يوماً</p>
                </div>
                <h2 class="section-title">الكراسات العشر</h2>
                <div class="courses-grid">${gridHtml}</div>
            `;
        }

        // ---------- خطة التدريس ----------
        function renderPlan() {
            const days = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس"];
            let rows = '';
            for (let i = 0; i < 30; i++) {
                const week = Math.floor(i / 6) + 1;
                const dayName = days[i % 6];
                const c1 = courses[i % courses.length].title;
                const c2 = courses[(i + 3) % courses.length].title;
                const c3 = courses[(i + 6) % courses.length].title;
                rows += `<tr><td>${dayName} (أسبوع ${week})</td><td>${c1}</td><td>${c2}</td><td>${c3}</td></tr>`;
            }
            return `
                <h2 class="section-title">📅 خطة التدريس اليومية</h2>
                <div class="plan-wrapper">
                    <table>
                        <thead><tr><th>اليوم</th><th>الحصة الأولى</th><th>الحصة الثانية</th><th>الحصة الثالثة</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        // ---------- التواصل ----------
        function renderContact() {
            return `
                <div class="contact-box">
                    <h2><i class="fas fa-headset"></i> تواصل معنا</h2>
                    <p style="font-size:1.1rem;color:var(--text-light);">للاستفسارات أو الدعم الفني</p>
                    <div class="contact-buttons">
                        <a href="https://chat.whatsapp.com/ImbpCTYkTwHJvD9akTAIPD" target="_blank" class="wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                        <a href="https://t.me/+bHRjkt2DD_BmODhk" class="tg"><i class="fab fa-telegram"></i> تليجرام</a>
                        <a href="mailto:abukora8@gmail.com" class="em"><i class="far fa-envelope"></i> البريد الإلكتروني</a>
                    </div>
                </div>
            `;
        }

        // ---------- عرض الكراسة (قائمة الدروس) ----------
        function renderCourse(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return '<p>الكراسة غير موجودة.</p>';
            let lessonsHtml = course.lessons.map((l, idx) => {
                const done = isLessonDone(courseId, idx);
                return `
                    <div class="lesson-item" onclick="navigateTo('lesson-${courseId}-${idx}')">
                        <div class="lesson-number">${idx+1}</div>
                        <div class="lesson-title">${l.title}</div>
                        <div class="lesson-status">${done ? '<i class="fas fa-check-circle" style="color:var(--green);"></i>' : ''}</div>
                    </div>
                `;
            }).join('');
            return `
                <div class="course-header">
                    <button class="btn-back" onclick="navigateTo('home')"><i class="fas fa-arrow-right"></i> العودة</button>
                    <span class="course-title">${course.title}</span>
                    <span class="course-stats"><i class="fas fa-book"></i> ${course.lessons.length} درس · ${getCourseProgress(courseId)}% مكتمل</span>
                </div>
                <div class="lessons-list">${lessonsHtml}</div>
            `;
        }

        // ---------- عرض الدرس المفصل ----------
        function renderLesson(courseId, lessonIndex) {
            const course = courses.find(c => c.id === courseId);
            if (!course || !course.lessons[lessonIndex]) {
                return '<p>الدرس غير موجود.</p>';
            }
            const lesson = course.lessons[lessonIndex];
            const total = course.lessons.length;
            const done = isLessonDone(courseId, lessonIndex);

            // تحسين المحتوى: إضافة تنسيقات تلقائية
            let contentHtml = lesson.content;
            // يمكنك إضافة معالجة إضافية هنا لتقسيم المحتوى إلى عناصر HTML

            const prevIdx = lessonIndex - 1;
            const nextIdx = lessonIndex + 1;

            return `
                <div class="course-header">
                    <button class="btn-back" onclick="navigateTo('course-${courseId}')"><i class="fas fa-arrow-right"></i> العودة للكراسة</button>
                    <span class="course-title">${course.title}</span>
                    <span class="course-stats">الدرس ${lessonIndex+1} من ${total}</span>
                </div>
                <div class="lesson-content">
                    <h1 style="margin-top:0;">${lesson.title}</h1>
                    ${contentHtml}
                </div>
                <div class="lesson-nav">
                    <div>
                        <button onclick="navigateTo('lesson-${courseId}-${prevIdx}')" ${prevIdx < 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-right"></i> السابق
                        </button>
                        <button onclick="navigateTo('lesson-${courseId}-${nextIdx}')" ${nextIdx >= total ? 'disabled' : ''}>
                            التالي <i class="fas fa-arrow-left"></i>
                        </button>
                    </div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <button class="btn-complete-lesson ${done ? 'done' : ''}" onclick="completeLessonFromView(${courseId}, ${lessonIndex})">
                            ${done ? '<i class="fas fa-check-circle"></i> مكتمل' : '<i class="fas fa-check"></i> أتممت هذا الدرس'}
                        </button>
                        <button class="share-btn" onclick="shareLesson()"><i class="fas fa-share-alt"></i> مشاركة</button>
                    </div>
                </div>
            `;
        }

        // ==================== دوال التفاعل ====================
        function completeLessonFromView(courseId, lessonIndex) {
            if (isLessonDone(courseId, lessonIndex)) {
                showCheerMessage("🎯", "الدرس مكتمل بالفعل!", "أنت ممتاز! واصل التقدم.");
                return;
            }
            localStorage.setItem(getProgressKey(courseId, lessonIndex), 'true');
            // تحديث العرض
            renderSection();
            const msgs = ["أحسنت يا بطل! 🌟", "ممتاز! استمر! 💪", "رائع! أنت تتقدم بثبات 🚀", "ما شاء الله عليك! 👏", "أنت بطل حصون الإيمان! 🏆"];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            showCheerMessage("🌟🌟🌟🌟🌟", msg, "لقد أتممت الدرس بنجاح، واصل رحلتك الإيمانية!");
        }

        function showCheerMessage(stars, title, desc) {
            document.querySelector('#cheerModal .stars').textContent = stars;
            document.getElementById('cheerMessage').textContent = title;
            document.getElementById('cheerDesc').textContent = desc;
            document.getElementById('cheerModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('cheerModal').style.display = 'none';
        }
        document.getElementById('cheerModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function shareLesson() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: document.title, url: url });
            } else {
                navigator.clipboard.writeText(url).then(() => alert('تم نسخ رابط الدرس!'));
            }
        }

        function attachLessonEvents() {
            // لا حاجة لإضافية
        }

        // ==================== الهامبرغر ====================
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // ==================== التحميل الأولي ====================
        window.onload = function() {
            navigateTo('home');
        };
    </script>
</body>
</html>
